        html, body, #map {

        /* ── Paleta institucional Polígon Vintem ── */
        :root {
            --accent:      #C8A96E;
            --accent-dark: #A8864E;
            --accent-pale: #F7EED8;
            --base-mid:    #F0E6D3;
            --estructura:  #1A1A1A;
            --text-soft:   #5A5250;
            --border:      rgba(200,169,110,.3);
        }

        /* Popup */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            border-top: 3px solid var(--accent);
            box-shadow: 0 6px 24px rgba(26,26,26,.18);
            padding: 0;
            overflow: hidden;
        }
        .leaflet-popup-content {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            color: var(--estructura);
            min-width: 200px;
        }
        .leaflet-popup-content table {
            width: 100%;
            border-collapse: collapse;
        }
        .leaflet-popup-content table th {
            background: var(--base-mid);
            color: var(--text-soft);
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .06em;
            padding: 5px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .leaflet-popup-content table td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(200,169,110,.12);
            color: var(--estructura);
            vertical-align: top;
        }
        .leaflet-popup-content table td strong {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--accent-dark);
            margin-bottom: 2px;
        }
        .leaflet-popup-tip { background: white; }
        .leaflet-popup-close-button {
            color: var(--text-soft) !important;
            font-size: 18px !important;
            padding: 4px 8px !important;
        }
        .leaflet-popup-close-button:hover { color: var(--accent-dark) !important; }

        /* Controls zoom */
        .leaflet-control-zoom {
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(26,26,26,.12) !important;
        }
        .leaflet-control-zoom a {
            color: var(--estructura) !important;
            font-weight: 600 !important;
            background: white !important;
            border-bottom-color: var(--border) !important;
            width: 32px !important;
            height: 32px !important;
            line-height: 32px !important;
        }
        .leaflet-control-zoom a:hover {
            background: var(--accent-pale) !important;
            color: var(--accent-dark) !important;
        }

        /* Layer tree control */
        .leaflet-control-layers {
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            box-shadow: 0 4px 16px rgba(26,26,26,.12) !important;
            font-family: 'Segoe UI', system-ui, sans-serif !important;
            font-size: 12px !important;
        }
        .leaflet-control-layers-toggle {
            background-color: white !important;
            border-radius: 8px !important;
            width: 32px !important;
            height: 32px !important;
        }
        .leaflet-control-layers-expanded {
            padding: 8px 12px !important;
            min-width: 180px;
        }

        /* Measure control */
        .leaflet-control-measure-toggle {
            background: white !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            color: var(--estructura) !important;
            width: 32px !important;
            height: 32px !important;
            line-height: 32px !important;
            box-shadow: 0 2px 8px rgba(26,26,26,.12) !important;
        }
        .leaflet-control-measure-toggle:hover {
            background: var(--accent-pale) !important;
            color: var(--accent-dark) !important;

        .leaflet-control-attribution {
            font-size: 10px !important;
            background: rgba(255,255,255,.75) !important;
            backdrop-filter: blur(4px);
        }
